<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Choice India</title>
<style>
  :root{
    --forest:#1C3A2B;
    --forest-deep:#12261D;
    --gold:#C8962A;
    --gold-light:#E4B65C;
    --paper:#F7F5EF;
    --leaf:#2FA85A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:
      radial-gradient(circle at 10% -10%, rgba(47,168,90,0.25), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(200,150,42,0.20), transparent 50%),
      var(--forest-deep);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--paper);
  }
  .wrap{
    width:100%;
    max-width:560px;
    text-align:center;
  }
  .logo{
    width:220px;
    max-width:70%;
    background:var(--paper);
    border-radius:18px;
    padding:18px 22px;
    margin:0 auto 34px;
    display:block;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(200,150,42,0.14);
    border:1px solid rgba(200,150,42,0.4);
    color:var(--gold-light);
    font-size:12px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:8px 16px;
    border-radius:999px;
    margin-bottom:24px;
  }
  .badge .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--leaf);
    box-shadow:0 0 0 4px rgba(47,168,90,0.2);
  }
  h1{
    font-size:clamp(26px, 5vw, 38px);
    font-weight:700;
    line-height:1.25;
    margin-bottom:16px;
    color:var(--paper);
  }
  p.lede{
    font-size:16px;
    line-height:1.6;
    color:rgba(247,245,239,0.7);
    max-width:420px;
    margin:0 auto 34px;
  }
  .socials{
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .socials a{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:var(--paper);
    background:rgba(247,245,239,0.06);
    border:1px solid rgba(247,245,239,0.14);
    padding:11px 18px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  }
  .socials a:hover{
    background:rgba(200,150,42,0.14);
    border-color:var(--gold);
    transform:translateY(-1px);
  }
  .socials svg{width:16px; height:16px; fill:var(--gold-light);}
  footer{
    margin-top:44px;
    font-size:11px;
    letter-spacing:0.5px;
    color:rgba(247,245,239,0.35);
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="logo.png" alt="Mega Choice India">
    <div class="badge"><span class="dot"></span> Website coming soon</div>
    <h1>We're building something worth the wait.</h1>
    <p class="lede">Our new website is currently under construction. In the meantime, stay connected with us on social media for updates, products, and offers.</p>
    <div class="socials">

    </div>
    <footer>MEGA CHOICE INDIA &middot; PAWAN KUMAR DHIRAJ KUMAR &middot; INDORE, INDIA</footer>

</body>
</html>
