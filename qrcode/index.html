<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Choice India</title>
<style>
  :root{
    --forest:#1C3A2B;
    --forest-deep:#12261D;
    --gold:#C8962A;
    --gold-light:#E4B65C;
    --paper:#F7F5EF;
    --leaf:#2FA85A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:
      radial-gradient(circle at 15% -10%, rgba(47,168,90,0.25), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(200,150,42,0.18), transparent 50%),
      var(--forest-deep);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--paper);
  }
  .card{
    width:100%;
    max-width:420px;
    background:var(--forest);
    border-radius:24px;
    padding:40px 28px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:180px; height:180px;
    background:radial-gradient(circle, rgba(47,168,90,0.35), transparent 70%);
    pointer-events:none;
  }
  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
  }
  .logo-wrap img{
    width:180px;
    max-width:70%;
    background:var(--paper);
    border-radius:16px;
    padding:14px 18px;
  }
  .eyebrow{
    text-align:center;
    color:var(--gold-light);
    font-size:12px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    text-align:center;
    font-size:22px;
    font-weight:600;
    line-height:1.35;
    margin-bottom:6px;
    color:var(--paper);
  }
  .sub{
    text-align:center;
    font-size:14px;
    color:rgba(247,245,239,0.65);
    margin-bottom:30px;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  a.option{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    background:rgba(247,245,239,0.06);
    border:1px solid rgba(247,245,239,0.12);
    border-radius:14px;
    padding:16px 18px;
    color:var(--paper);
    transition:background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
  }
  a.option:hover, a.option:active{
    background:rgba(200,150,42,0.14);
    border-color:var(--gold);
    transform:translateY(-1px);
  }
  .icon{
    width:38px; height:38px;
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:var(--gold);
  }
  .icon svg{width:20px; height:20px; fill:var(--forest-deep);}
  .option-text{flex:1;}
  .option-title{font-size:15px; font-weight:600;}
  .option-desc{font-size:12px; color:rgba(247,245,239,0.55); margin-top:2px;}
  .chevron{color:rgba(247,245,239,0.35); font-size:18px;}
  footer{
    text-align:center;
    margin-top:28px;
    font-size:11px;
    color:rgba(247,245,239,0.35);
    letter-spacing:0.5px;
  }
</style>
</head>

</body>
</html>
